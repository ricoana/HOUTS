<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>HOUTS | AI Architecture Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* --- FULL VIEWPORT CHAT OVERRIDE --- */
        .chat-main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 940px;
            margin: 0 auto;
            min-height: calc(100vh - 80px); 
            padding: 2rem 1.5rem 10rem 1.5rem; 
            box-sizing: border-box;
            position: relative;
        }

        /* --- CHAT MESSAGES PANEL --- */
        .chat-messages-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            padding: 1rem 0;
            width: 100%;
        }

        .message-row {
            display: flex;
            gap: 1.25rem;
            width: 100%;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-sizing: border-box;
        }

        .message-row.user-msg {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-row.user-msg .message-avatar {
            background: var(--primary);
            color: white;
            order: 2;
        }

        .message-row.ai-msg .message-avatar {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
        }

        .message-bubble {
            max-width: 85%;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .message-row.user-msg .message-bubble {
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border);
            padding: 0.85rem 1.35rem;
            border-radius: 20px;
            border-top-right-radius: 4px;
        }

        .message-row.ai-msg .message-bubble {
            padding: 0.35rem 0;
            max-width: calc(100% - 55px);
        }

        /* --- STICKY FOOTER INPUT CONTROLS --- */
        .chat-input-wrapper {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 940px;
            padding: 0 1.5rem 2.5rem 1.5rem;
            background: linear-gradient(transparent 0%, var(--bg-main) 40%);
            z-index: 10;
            box-sizing: border-box;
        }

        .chat-input-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        .chat-input-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow), 0 10px 40px rgba(0,0,0,0.3);
        }

        .chat-input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            max-height: 160px;
            line-height: 1.5;
            padding: 0.25rem 0;
        }

        .chat-input-container textarea::placeholder {
            color: var(--text-muted);
        }

        .chat-send-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .chat-input-container textarea:valid + .chat-send-btn {
            color: var(--text-primary);
            background: var(--primary);
        }

        .chat-send-btn:hover {
            transform: scale(1.05);
        }

        .chat-copyright {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.85rem;
            opacity: 0.8;
        }

        /* --- SHIMMER EFFECT FOR AI LOADING --- */
        .ai-loader {
            display: flex;
            flex-direction: column;
            gap: 0.60rem;
            width: 100%;
            padding-top: 0.5rem;
        }

        .loader-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--bg-surface-elevated) 25%, var(--border) 50%, var(--bg-surface-elevated) 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite linear;
        }

        .loader-line:nth-child(1) { width: 35%; }
        .loader-line:nth-child(2) { width: 85%; }
        .loader-line:nth-child(3) { width: 60%; }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-grid-overlay"></div>
    <div class="ambient-glow"></div>

    <header class="site-header">
        <div class="header-container">
            <a href="./index.html#home" class="brand-logo">HOUTS<span>.</span></a>
            
            <button class="mobile-menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-menu">
                <a href="./index.html#home" class="nav-link">Back to Home</a>
                <a href="#login" class="nav-link auth-link-login">Login</a>
                <a href="#signup" class="nav-cta-btn">Get Started</a>
            </nav>
        </div>
    </header>

    <main class="chat-main-layout">
        
        <div id="chat-messages" class="chat-messages-container"></div>

        <div class="chat-input-wrapper">
            <form id="chat-form" class="chat-input-container">
                <textarea id="chat-input-field" placeholder="Ask HOUTS anything..." rows="1" required></textarea>
                <button type="submit" class="chat-send-btn" aria-label="Send Message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
            <div class="chat-copyright">&copy; 2026 HOUTS. All rights reserved.</div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input-field');

            if (chatInput) {
                chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
                });

                chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        chatForm.requestSubmit();
                    }
                });
            }

            if (chatForm) {
                chatForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const text = chatInput.value.trim();
                    if (!text) return;

                    if (typeof window.executeSecureChatPipeline === 'function') {
                        window.executeSecureChatPipeline(text);
                    } else {
                        appendMessageRow(text, 'user');
                    }
                    
                    chatInput.value = '';
                    chatInput.style.height = 'auto';
                });
            }
        });

        function appendMessageRow(htmlContent, sender) {
            const container = document.getElementById('chat-messages');
            if (!container) return;
            
            const row = document.createElement('div');
            row.className = `message-row ${sender}-msg`;

            const avatarText = sender === 'user' ? 'U' : 'H';
            
            row.innerHTML = `
                <div class="message-avatar">${avatarText}</div>
                <div class="message-bubble">${htmlContent}</div>
            `;
            container.appendChild(row);
        }

        function appendAiLoader() {
            const container = document.getElementById('chat-messages');
            if (!container) return null;
            
            const row = document.createElement('div');
            const trackingId = 'loader-' + Date.now();
            row.id = trackingId;
            row.className = 'message-row ai-msg';

            row.innerHTML = `
                <div class="message-avatar">H</div>
                <div class="message-bubble" style="width: 100%;">
                    <div class="ai-loader">
                        <div class="loader-line"></div>
                        <div class="loader-line"></div>
                        <div class="loader-line"></div>
                    </div>
                </div>
            `;
            container.appendChild(row);
            return trackingId;
        }

        function removeAiLoader(id) {
            if (!id) return;
            const targetedLoader = document.getElementById(id);
            if (targetedLoader) targetedLoader.remove();
        }

        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
